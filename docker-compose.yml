version: '3.9'

services:
  triageflow:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY:-}
      - TRIAGEFLOW_API_KEY=${TRIAGEFLOW_API_KEY:-}
      - DATA_DIR=/app/data
    volumes:
      - ./triageflow_data:/app/data
